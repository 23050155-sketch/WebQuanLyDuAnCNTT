<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Quản lý dự án</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>📝 Đăng ký tài khoản</h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Tên đăng nhập *</label>
                    <input type="text" id="username" required placeholder="Nhập tên đăng nhập (ít nhất 3 ký tự)">
                </div>
                
                <div class="form-group">
                    <label>Mật khẩu *</label>
                    <input type="password" id="password" required placeholder="Nhập mật khẩu (ít nhất 6 ký tự)">
                </div>
                
                <div class="form-group">
                    <label>Xác nhận mật khẩu *</label>
                    <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu">
                </div>
                
                <div class="form-group">
                    <label>Họ và tên *</label>
                    <input type="text" id="fullname" required placeholder="Nhập họ và tên">
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label>Mức lương theo giờ (VNĐ)</label>
                    <input type="number" id="hourlyRate" value="0" placeholder="0">
                </div>
                
                <div id="formError" class="error-message"></div>
                <div id="formSuccess" class="success-message"></div>
                
                <button type="submit" class="btn-primary" id="submitBtn">✅ Đăng ký</button>
                <button type="button" onclick="window.location.href='login.html'" class="btn-secondary">← Quay lại đăng nhập</button>
            </form>
            
            <div class="login-link">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
    
    <script src="../js/register.js"></script>
</body>
</html>
